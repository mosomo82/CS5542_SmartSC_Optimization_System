random_seed: 42
srsnet:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
remindrag:
  max_tokens: 1024
  temperature: 0.7
snowflake:
  account: ${SNOWFLAKE_ACCOUNT}
  user: ${SNOWFLAKE_USER}
  password: ${SNOWFLAKE_PASSWORD}
  role: ${SNOWFLAKE_ROLE}
  warehouse: ${SNOWFLAKE_WAREHOUSE}
  database: ${SNOWFLAKE_DATABASE}
  schema: ${SNOWFLAKE_SCHEMA}
aws:
  region: ${AWS_REGION}
  s3_bucket: ${S3_BUCKET}
  role_arn: ${SNOWFLAKE_ROLE_ARN}
datasets:
  dataco_path: data/DataCoSupplyChainDataset.csv
  accidents_path: data/US_Accidents_March23.csv
  bridges_path: data/NationalBridgeInventory.csv